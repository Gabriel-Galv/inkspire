name: inkspire
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # Navigation
  go_router: ^14.0.0

  # Backend
  supabase_flutter: ^2.5.0

  # HTTP
  dio: ^5.4.0
  retrofit: ^4.1.0

  # UI
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Utils
  fpdart: ^1.1.0
  hive_flutter: ^1.1.0
  reactive_forms: ^17.0.0
  get_it: ^8.0.0
  injectable: ^2.4.0
  intl: ^0.20.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation — versiones compatibles entre sí
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0
  retrofit_generator: ^9.7.0   # <-- este era el problema, subir de ^8.1.0 a ^9.7.0
  injectable_generator: ^2.4.0
  mocktail: ^1.0.0

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
